<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Something Went Wrong | Panefree Quoting</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col">
    <main class="flex-grow flex items-center justify-center px-6">
        <div class="max-w-md text-center">
            <h1 class="text-6xl font-bold text-slate-300 mb-4">500</h1>
            <h2 class="text-2xl font-semibold mb-2">Something went wrong</h2>
            <p class="text-slate-500 mb-8">Sorry — that's on our side. Try again in a moment, or let us know what you were doing and we'll dig into it.</p>
            <a href="/" class="inline-block bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-5 rounded-lg shadow-md transition-all">Back to dashboard</a>
            <p class="mt-8 text-sm text-slate-500">
                Need help? Email <a href="mailto:{{ support_email }}" class="text-blue-600 hover:underline">{{ support_email }}</a>.
            </p>
        </div>
    </main>
    {% include "_footer.html" %}
</body>
</html>
