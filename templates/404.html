<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Page Not Found | Panefree Quoting</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/output.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col">
    <main class="flex-grow flex items-center justify-center px-6">
        <div class="max-w-md text-center">
            <h1 class="text-6xl font-bold text-slate-300 mb-4">404</h1>
            <h2 class="text-2xl font-semibold mb-2">Page not found</h2>
            <p class="text-slate-500 mb-8">The page you're looking for doesn't exist or you don't have access to it.</p>
            <a href="/" class="inline-block bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-5 rounded-lg shadow-md transition-all">Go to dashboard</a>
            <p class="mt-8 text-sm text-slate-500">
                Stuck? Email <a href="mailto:{{ support_email }}" class="text-blue-600 hover:underline">{{ support_email }}</a> and we'll help.
            </p>
        </div>
    </main>
    {% include "_footer.html" %}
</body>
</html>
