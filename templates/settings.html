<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings | Astral Resonance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .industrial-gradient {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
    <nav class="industrial-gradient text-white py-4 px-6 shadow-lg flex justify-between items-center">
        <div class="flex items-center gap-3">
            <a href="/" class="text-2xl font-bold tracking-tight">ASTRAL<span class="text-blue-400"> RESONANCE</span></a>
        </div>
        <div class="text-sm font-medium opacity-80">Pricing Administration</div>
    </nav>

    <main class="max-w-4xl mx-auto py-12 px-6">
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-8">
            <h2 class="text-2xl font-bold mb-6 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.06 anharmonic-logic-here" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V8" />
                </svg>
                Pricing Registry
            </h2>

            <form method="POST" class="space-y-8">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <!-- Active Profile Selection -->
                <div class="bg-slate-50 p-4 rounded-lg border border-slate-200">
                    <label class="block text-sm font-bold text-slate-500 uppercase tracking-wider mb-2">Active Pricing Profile</label>
                    <select name="active_profile" class="w-full p-2 border border-slate-300 rounded-md bg-white">
                        {% for profile in registry.profiles %}
                        <option value="{{ profile }}" {% if profile == registry.active_profile %}selected{% endif %}>{{ profile }}</option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Profile Editor -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="space-y-4">
                        <label class="block text-sm font-bold text-slate-500 uppercase tracking-wider">Profile to Edit</label>
                        <select name="profile_id" class="w-full p-2 border border-slate-300 rounded-md bg-white">
                            {% for profile in registry.profiles %}
                            <option value="{{ profile }}" {% if profile == registry.active_profile %}selected{% endif %}>{{ profile }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="space-y-4">
                        <label class="block text-sm font-bold text-slate-500 uppercase tracking-wider">Base Pane Rate ($)</label>
                        <input type="number" step="0.01" name="base_pane_rate" 
                               class="w-full p-2 border border-slate-300 rounded-md"
                               value="{{ registry.profiles[registry.active_profile].base_pane_rate }}">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="space-y-4">
                        <label class="block text-sm font-bold text-slate-500 uppercase tracking-wider">Callout Fee ($)</label>
                        <input type="number" step="0.01" name="base_callout_fee" 
                               class="w-full p-2 border border-slate-300 rounded-md"
                               value="{{ registry.profiles[registry.active_profile].base_callout_fee }}">
                    </div>
                    <div class="space-y-4">
                        <label class="block text-sm font-bold text-slate-500 uppercase tracking-wider">Tax Rate (e.g. 0.10 for 10%)</label>
                        <input type="number" step="0.01" name="tax_rate" 
                               class="w-full p-2 border border-slate-300 rounded-md"
                               value="{{ registry.profiles[registry.active_profile].tax_rate }}">
                    </div>
                </div>

                <div class="pt-6">
                    <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-lg shadow-md transition-all active:scale-95">
                        Save Changes
                    </button>
                </div>
            </form>
        </div>
    </main>
    {% include "_footer.html" %}
</body>
</html>
